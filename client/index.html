<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Idea Basin</title>
  <link rel="icon" type="image/png" href="/favicon-32.png" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overscroll-behavior: none; }
    body { background: #0f0a1a; font-family: 'JetBrains Mono', monospace; }
    button { -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f0a1a; }
    ::-webkit-scrollbar-thumb { background: #4c3d99; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #6d5dbb; }
    .ib-pulse { animation: ibpulse 1.5s infinite; }
    @keyframes ibpulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
