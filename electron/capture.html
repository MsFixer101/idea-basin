<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quick Capture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1025;
    color: #e2ddf0;
    font-size: 13px;
    overflow: hidden;
    border: 1px solid #3b2d5e;
    border-radius: 10px;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .titlebar {
    -webkit-app-region: drag;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 10px;
    background: #140e20;
    border-bottom: 1px solid #2a1f40;
    border-radius: 10px 10px 0 0;
    flex-shrink: 0;
  }
  .titlebar span {
    font-size: 12px;
    font-weight: 600;
    color: #c084fc;
    letter-spacing: 0.5px;
  }
  .titlebar button {
    -webkit-app-region: no-drag;
    background: none;
    border: none;
    color: #8b7aa8;
    font-size: 18px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }
  .titlebar button:hover { color: #e2ddf0; }

  .body {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 10px 12px;
    gap: 8px;
    overflow: hidden;
  }

  label {
    font-size: 11px;
    color: #8b7aa8;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }

  select, input, textarea {
    background: #0f0a1a;
    border: 1px solid #2a1f40;
    border-radius: 6px;
    color: #e2ddf0;
    padding: 7px 9px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    width: 100%;
  }
  select:focus, input:focus, textarea:focus {
    border-color: #7c3aed;
  }

  .content-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  textarea.clip-text {
    flex: 1;
    resize: none;
  }
  .clip-image {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f0a1a;
    border: 1px solid #2a1f40;
    border-radius: 6px;
    overflow: hidden;
    min-height: 0;
    position: relative;
  }
  .clip-image img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
  .clip-image .switch-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    background: #2a1f40;
    border: none;
    color: #c084fc;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    cursor: pointer;
  }
  .clip-image .switch-btn:hover { background: #3b2d5e; }

  .actions {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }
  .process-check {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-right: auto;
    cursor: pointer;
    text-transform: none;
    font-size: 12px;
  }
  .process-check input { cursor: pointer; }
  .actions button {
    padding: 7px 18px;
    border-radius: 6px;
    border: none;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }
  .btn-cancel {
    background: #2a1f40;
    color: #8b7aa8;
  }
  .btn-cancel:hover { background: #3b2d5e; color: #e2ddf0; }
  .btn-save {
    background: #7c3aed;
    color: #fff;
  }
  .btn-save:hover { background: #6d28d9; }
  .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

  .empty-msg {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #5a4d73;
    font-style: italic;
  }

  .status {
    font-size: 11px;
    color: #5a4d73;
    text-align: center;
    flex-shrink: 0;
  }
  .status.error { color: #f87171; }
  .status.success { color: #4ade80; }
</style>
</head>
<body>

<div class="titlebar">
  <span>Quick Capture</span>
  <button onclick="doClose()" title="Close (Esc)">&times;</button>
</div>

<div class="body">
  <!-- Save to -->
  <div>
    <label>Save to</label>
    <select id="node-select"><option value="">Loading...</option></select>
  </div>

  <!-- Clipboard content preview -->
  <div class="content-area" id="content-area">
    <div class="empty-msg">Reading clipboard...</div>
  </div>

  <!-- Optional note -->
  <div>
    <input type="text" id="why-input" placeholder="Note (optional)">
  </div>

  <!-- Actions -->
  <div class="actions">
    <label class="process-check">
      <input type="checkbox" id="process-check"> Tag &amp; embed
    </label>
    <button class="btn-cancel" onclick="doClose()">Cancel</button>
    <button class="btn-save" id="save-btn" onclick="doSave()">Save</button>
  </div>

  <div class="status" id="status"></div>
</div>

<script>
const API = 'http://localhost:3500';
let clipData = { text: null, imageDataUrl: null };
let defaultNodeId = null;
let mode = null; // 'text' | 'image'

// --- Init ---
async function init() {
  try {
    const [clip, nodeInfo] = await Promise.all([
      window.capture.getClipboard(),
      window.capture.getNodes(),
    ]);

    clipData = clip;
    defaultNodeId = nodeInfo.scrapDrawerId;
    populateNodes(nodeInfo.nodes, defaultNodeId);
    showClipboard();
  } catch (err) {
    setStatus('Failed to initialize: ' + err.message, 'error');
  }
}

// --- Nodes ---
function populateNodes(flatNodes, defaultId) {
  const sel = document.getElementById('node-select');
  sel.innerHTML = '';
  flatNodes.forEach(n => {
    const opt = document.createElement('option');
    opt.value = n.id;
    opt.textContent = n.path;
    sel.appendChild(opt);
  });
  if (defaultId) sel.value = defaultId;
}

// --- Clipboard display ---
function showClipboard() {
  const area = document.getElementById('content-area');

  if (clipData.imageDataUrl) {
    mode = 'image';
    area.innerHTML = `
      <div class="clip-image">
        <img src="${clipData.imageDataUrl}" alt="Clipboard image">
        ${clipData.text ? '<button class="switch-btn" onclick="switchToText()">Show text</button>' : ''}
      </div>`;
  } else if (clipData.text) {
    mode = 'text';
    area.innerHTML = `<textarea class="clip-text" id="clip-textarea">${escapeHtml(clipData.text)}</textarea>`;
  } else {
    mode = null;
    area.innerHTML = '<div class="empty-msg">Clipboard is empty</div>';
  }
}

function switchToText() {
  mode = 'text';
  const area = document.getElementById('content-area');
  area.innerHTML = `<textarea class="clip-text" id="clip-textarea">${escapeHtml(clipData.text)}</textarea>`;
}

// --- Save ---
async function doSave() {
  const nodeId = document.getElementById('node-select').value;
  if (!nodeId) { setStatus('Pick a target node', 'error'); return; }
  if (!mode) { setStatus('Nothing to save', 'error'); return; }

  const why = document.getElementById('why-input').value.trim() || undefined;
  const process = document.getElementById('process-check').checked;
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  setStatus(process ? 'Saving & processing...' : 'Saving...');

  try {
    if (mode === 'image') {
      await saveImage(nodeId, why, process);
    } else {
      await saveText(nodeId, why, process);
    }

    await window.capture.saved(nodeId);
    setStatus('Saved!', 'success');
    setTimeout(() => doClose(), 300);
  } catch (err) {
    setStatus('Save failed: ' + err.message, 'error');
    btn.disabled = false;
  }
}

async function saveText(nodeId, why, process) {
  const text = document.getElementById('clip-textarea')?.value || clipData.text;
  const isUrl = /^https?:\/\/\S+$/i.test(text.trim());

  const body = { node_id: nodeId, type: isUrl ? 'link' : 'note', why };
  if (isUrl) body.url = text.trim();
  // Always include content for text — ingestion happens when content is present
  body.content = text;

  const res = await fetch(`${API}/api/resources`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
}

async function saveImage(nodeId, why, process) {
  const filename = `capture-${Date.now()}.png`;

  const uploadRes = await fetch(`${API}/api/upload`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      filename,
      data: clipData.imageDataUrl.replace(/^data:image\/\w+;base64,/, ''),
      node_id: nodeId,
    }),
  });
  if (!uploadRes.ok) throw new Error(`Upload: HTTP ${uploadRes.status}`);
  const { url } = await uploadRes.json();

  const body = { node_id: nodeId, type: 'file', url, why };
  // When processing, pass the note as content to trigger ingestion
  if (process && why) body.content = why;
  const res = await fetch(`${API}/api/resources`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error(`Resource: HTTP ${res.status}`);
}

// --- Helpers ---
function doClose() {
  window.capture.close();
}

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (cls ? ' ' + cls : '');
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') doClose();
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) doSave();
});

init();
</script>
</body>
</html>
